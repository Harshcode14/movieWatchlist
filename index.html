<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="./movie.css" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Smythe&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
<header>
    <h1>Find your film</h1>
    <a href="./watchlist.html">My Watchlist</a>
    <div class="search-bar" id="movie-search">
    <i class="fa-solid fa-search search-icon" ></i>
    <input type="text" id="movie-name" placeholder="Enter movie name..">
    <button id="searchMovie">Search</button>
</div>
</header>
<main>
    <section id="movies" class="movies">
    </section>
<div class="explore" id="explore"> 
    <i class="fa-solid fa-film "></i>
    <h3>Start exploring</h3>
</div>
<div class="none search-fail " id="search-fail">
    <h3>Unable to find what you’re looking for. Please try another search.</h3>
</div>
<p class="modal-message none" id="modal-message">Added!</p>
</main>
<script src="./movie.js" type="module"></script>
</body>
</html>
